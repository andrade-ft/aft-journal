<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>AFT Journal</title>


<link 
rel="icon" 
type="image/png" 
href="logo.png">


<link 
rel="stylesheet" 
href="./style.css?v=3.3">


</head>





<body>


<div class="app">



<!-- ================= HEADER ================= -->


<header>


<div class="brand">


<img 
src="logo.png" 
class="logo">


<div>


<h1>
AFT JOURNAL
<span>PRO</span>
</h1>


<p>
Decision Based Trading System
</p>


</div>


</div>





<div class="header-buttons">


<button onclick="abrirTrade()">

+ NEW TRADE

</button>




<button onclick="exportarJSON()">

EXPORT

</button>


</div>



</header>









<!-- ================= MODES ================= -->


<div class="switch">


<button 
id="btnBack"
onclick="cambiarModo('Backtesting')">

BACKTESTING

</button>




<button 
id="btnLive"
onclick="cambiarModo('Live Journal')">

LIVE

</button>






<select 
id="environmentFiltro"
onchange="actualizar()">



<option>

Todos

</option>


<option>

Demo

</option>


<option>

Challenge

</option>


<option>

Funded

</option>


<option>

Personal

</option>


</select>



</div>









<!-- ================= METRICS ================= -->


<section class="stats">



<div class="stat">

<p>TOTAL R</p>

<h2 id="totalR">0R</h2>

<div class="bar"></div>

</div>





<div class="stat">

<p>WIN RATE</p>

<h2 id="winrate">0%</h2>

<div class="bar"></div>

</div>





<div class="stat">

<p>PROFIT FACTOR</p>

<h2 id="pf">0</h2>

<div class="bar"></div>

</div>





<div class="stat">

<p>AVG R</p>

<h2 id="avgR">0R</h2>

<div class="bar"></div>

</div>





<div class="stat danger">

<p>MAX DD</p>

<h2 id="drawdown">0R</h2>

<div class="bar redbar"></div>

</div>





<div class="stat">

<p>BEST TRADE</p>

<h2 id="bestTrade">0R</h2>

<div class="bar"></div>

</div>





<div class="stat danger">

<p>WORST TRADE</p>

<h2 id="worstTrade">0R</h2>

<div class="bar redbar"></div>

</div>





<div class="stat">

<p>STREAK</p>

<h2 id="streak">0</h2>

<div class="bar"></div>

</div>



</section>









<div class="dashboard-grid">



<div>



<!-- ================= CALENDAR ================= -->


<section class="glass calendar-box">



<div class="calendar-top">


<button onclick="cambiarMes(-1)">

‹

</button>



<div>


<h2 id="mesTexto">

Mes

</h2>


<p id="year">

2026

</p>


</div>





<button onclick="cambiarMes(1)">

›

</button>



</div>






<div class="week">


<span>LUN</span>

<span>MAR</span>

<span>MIÉ</span>

<span>JUE</span>

<span>VIE</span>

<span>SÁB</span>

<span>DOM</span>


</div>





<div id="calendar"></div>



</section>









<!-- ================= HISTORY ================= -->


<section class="glass trades-table">


<h2>

TRADE HISTORY

</h2>




<table>


<thead>


<tr>


<th>DATE</th>

<th>SETUP</th>

<th>DIR</th>

<th>R</th>

<th>ASR</th>


</tr>


</thead>



<tbody id="listaTrades"></tbody>



</table>


</section>



</div>









<!-- ================= RIGHT ================= -->


<aside class="glass right-panel">


<h2>

RECENT TRADES

</h2>



<div id="ultimosTrades"></div>



</aside>



</div>



</div>









<!-- ================= MODAL TRADE ================= -->


<div 
id="modal"
class="modal">



<div class="modal-card glass">



<h2 id="tituloModal">

Nuevo Trade

</h2>




<label>Fecha</label>

<input 
id="fecha"
type="date">





<label>Tipo</label>


<select 
id="tipo"
onchange="controlEnvironment()">



<option>

Backtesting

</option>


<option>

Live Journal

</option>


</select>








<div id="environmentBox">


<label>Environment</label>


<select id="environment">


<option>Demo</option>

<option>Challenge</option>

<option>Funded</option>

<option>Personal</option>


</select>


</div>








<label>Mercado</label>


<select id="mercado">


<option>NQ</option>

<option>ES</option>


</select>








<label>Setup</label>


<select id="setup">


<option>Continuación</option>

<option>Reversal</option>


</select>








<label>Dirección</label>


<select id="direction">


<option>Long</option>

<option>Short</option>


</select>








<label>Análisis</label>


<textarea 
id="analisis">

</textarea>








<label>Resultado R</label>


<input 
id="rr"
type="number"
step="0.1">







<h3>ENTRY</h3>



<label>HTF</label>

<input 
id="entryHTF"
type="file"
accept="image/*"
onchange="previewIndividual(this,'previewHTF')">


<div 
id="previewHTF"
class="preview-img">
</div>






<label>LTF</label>

<input 
id="entryLTF"
type="file"
accept="image/*"
onchange="previewIndividual(this,'previewLTF')">


<div 
id="previewLTF"
class="preview-img">
</div>






<label>AUX</label>


<input 
id="entryAux"
type="file"
accept="image/*"
onchange="previewIndividual(this,'previewAux')">


<div 
id="previewAux"
class="preview-img">
</div>









<h3>EXIT</h3>



<input 
id="exitImg"
type="file"
accept="image/*"
onchange="previewIndividual(this,'previewExit')">


<div 
id="previewExit"
class="preview-img">
</div>








<h3>POST TRADE</h3>


<input 
id="postImg"
type="file"
accept="image/*"
onchange="previewIndividual(this,'previewPost')">


<div 
id="previewPost"
class="preview-img">
</div>









<button 
class="save"
onclick="guardarTrade()">


SAVE TRADE


</button>





<button 
class="close"
onclick="cerrarTrade()">


CLOSE


</button>




</div>


</div>









<!-- ================= REVIEW ================= -->


<div 
id="review"
class="modal">



<div class="modal-card glass">


<div id="reviewContent"></div>




<button 
class="save"
onclick="guardarASR()">


SAVE ASR


</button>





<button 
id="editarBtn"
class="close">


EDIT TRADE


</button>





<button 
onclick="cerrarReview()"
class="close">


CLOSE


</button>



</div>


</div>










<!-- ================= IMAGE VIEW ================= -->


<div 
id="visor"
onclick="cerrarImagen()">



<img id="imagenFull">



</div>








<!-- FIREBASE MODULE APP -->


<script 
type="module"
src="./app.js">
</script>




</body>

</html>
